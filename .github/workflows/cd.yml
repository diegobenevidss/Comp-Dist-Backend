name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/diegobenevidss
  GHCR_USERNAME: diegobenevidss

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: identity-service
            dockerfile: services/identity-service/Dockerfile
          - name: patient-service
            dockerfile: services/patient-service/Dockerfile
          - name: triage-service
            dockerfile: services/triage-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/healthsys-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  build-and-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: felipexxxxx/Comp-Dist-Fronted
          token: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/healthsys-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_BASE_URL=/
            VITE_USE_MOCK_API=false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-aks:
    name: Deploy to Kubernetes (Azure AKS)
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - build-and-push-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'healthsys-rg'
          cluster-name: 'healthsys-cluster'

      - name: Create namespace and GHCR pull secret
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl delete secret ghcr-pull-secret -n healthsys --ignore-not-found
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ env.GHCR_USERNAME }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            -n healthsys
          kubectl patch serviceaccount default -n healthsys \
            -p '{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}'

      - name: Apply manifests
        run: |
          kubectl delete job postgres-init -n healthsys --ignore-not-found
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-postgres.yaml
          kubectl wait --for=condition=complete job/postgres-init -n healthsys --timeout=180s
          kubectl apply -f k8s/03-rabbitmq.yaml
          kubectl apply -f k8s/10-redis.yaml
          kubectl apply -f k8s/04-identity-service.yaml
          kubectl apply -f k8s/05-patient-service.yaml
          kubectl apply -f k8s/11-triage-service.yaml
          kubectl apply -f k8s/06-notification-service.yaml
          kubectl apply -f k8s/07-api-gateway.yaml
          kubectl apply -f k8s/12-frontend.yaml
          kubectl apply -f k8s/08-monitoring.yaml
          kubectl apply -f k8s/09-ingress.yaml
          kubectl rollout restart deployment/api-gateway deployment/identity-service deployment/patient-service deployment/triage-service deployment/notification-service deployment/frontend -n healthsys

      - name: Wait for rollout
        run: |
          for svc in api-gateway identity-service patient-service triage-service notification-service frontend prometheus grafana; do
            if ! kubectl rollout status deployment/$svc -n healthsys --timeout=300s; then
              echo "::group::Kubernetes diagnostics for $svc"
              kubectl get pods -n healthsys -o wide
              kubectl describe deployment/$svc -n healthsys
              kubectl describe pods -n healthsys -l app=$svc
              
              echo "--- LOGS DO POD ANTIGO (IGNORAR SE O NOVO ESTIVER QUEBRANDO) ---"
              kubectl logs -n healthsys deployment/$svc --all-containers --tail=50 || true
              
              echo "--- LOGS DO POD NOVO (O QUE DEU ERRO AGORA) ---"
              NEW_POD=$(kubectl get pods -n healthsys -l app=$svc --sort-by=.metadata.creationTimestamp -o jsonpath="{.items[-1].metadata.name}")
              echo "Buscando logs de: $NEW_POD"
              kubectl logs -n healthsys $NEW_POD --all-containers --tail=200 || true
              kubectl logs -n healthsys $NEW_POD --all-containers --previous --tail=200 || true
              
              echo "--- EVENTOS DO CLUSTER ---"
              kubectl get events -n healthsys --sort-by=.lastTimestamp | tail -80
              echo "::endgroup::"
              exit 1
            fi
          done

      - name: Show cloud endpoints
        run: |
          kubectl get svc -n healthsys -o wide
          kubectl get ingress -n healthsys -o wide

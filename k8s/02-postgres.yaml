apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: healthsys
data:
  init.sql: |
    SELECT 'CREATE DATABASE healthsys_identity'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'healthsys_identity') \gexec

    SELECT 'CREATE DATABASE healthsys_patient'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'healthsys_patient') \gexec

    SELECT 'CREATE DATABASE healthsys_triage'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'healthsys_triage') \gexec

    SELECT 'CREATE DATABASE healthsys_notification'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'healthsys_notification') \gexec
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: healthsys
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: healthsys
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: healthsys
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: healthsys
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-init
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: postgres-password
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U postgres; do
                sleep 2
              done
              psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 -f /docker-entrypoint-initdb.d/init.sql
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
